<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>WebAR - Rising Animation with Diagnostics</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <script>
      AFRAME.registerComponent('marker-debugger', {
        init: function () {
          var el = this.el;
          this.isDetected = false;
          
          // Triggered immediately when the camera matches the Hiro pattern
          el.addEventListener('markerFound', () => {
            this.isDetected = true;
            console.log("%c🟢 AR.JS EVENT: Hiro Marker has just been FOUND!", "background: #222; color: #bada55; font-size: 14px; font-weight: bold;");
          });
          
          // Triggered immediately when the pattern is broken/lost
          el.addEventListener('markerLost', () => {
            this.isDetected = false;
            console.log("%c🔴 AR.JS EVENT: Hiro Marker has been LOST!", "background: #222; color: #ff6b6b; font-size: 14px; font-weight: bold;");
          });

          // Continuous diagnostic interval running every 2000ms (2 seconds)
          setInterval(() => {
            if (this.isDetected) {
              console.log("📡 [DIAGNOSTIC] Status: DETECTED. The 3D entity should be visible in your viewport right now.");
            } else {
              console.warn("⚠️ [DIAGNOSTIC] Status: NOT DETECTED. Camera is currently blind to the Hiro pattern.");
            }
          }, 2000);
        }
      });
    </script>
  </head>
  
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;" 
      renderer="antialias: true; alpha: true"
    >
      <a-assets>
        <a-asset-item 
          id="animated-model" 
          src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/CesiumMan/glTF-Binary/CesiumMan.glb">
        </a-asset-item>
      </a-assets>

      <a-marker preset="hiro" marker-debugger>
        
        <a-entity 
          gltf-model="#animated-model"
          scale="1 1 1"
          rotation="0 0 0" 
          animation-mixer="loop: repeat"
          animation="property: position; from: 0 -3 0; to: 0 0.5 0; dur: 3000; dir: alternate; loop: true; easing: easeInOutQuad"
        ></a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
    
  </body>
</html>
