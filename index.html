<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>WebAR - Rising Animation</title>
    
    <!-- 1. Include A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    
    <!-- 2. Include AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <!-- 3. Include A-Frame Extras (Required to play internal 3D model animations) -->
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene 
      embedded 
      arjs="sourceType: webcam; debugUIEnabled: false;" 
      renderer="antialias: true; alpha: true"
    >
      <!-- Asset Management -->
      <a-assets>
        <!-- Placeholder Animated Model: Cesium Man -->
        <a-asset-item 
          id="animated-model" 
          src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/CesiumMan/glTF-Binary/CesiumMan.glb">
        </a-asset-item>
      </a-assets>

      <!-- The Tracking Marker -->
      <a-marker preset="hiro">
        
        <!-- 
          The 3D Model Entity
          - Scale set to 1 1 1 for predictable sizing
          - Rotation set to 0 0 0 to keep the model native and upright
          - Animation loops continuously so you don't miss it when scanning
        -->
        <a-entity 
          gltf-model="#animated-model"
          scale="1 1 1"
          rotation="0 0 0" 
          animation-mixer="loop: repeat"
          animation="property: position; from: 0 -3 0; to: 0 0.5 0; dur: 3000; dir: alternate; loop: true; easing: easeInOutQuad"
        ></a-entity>

      </a-marker>

      <!-- The AR Camera -->
      <a-entity camera></a-entity>
    </a-scene>
    
  </body>
</html>
